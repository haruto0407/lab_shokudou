<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学食堂 ユーザー登録システム</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #31104b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 1050px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }

        @media (max-width: 850px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 1.25rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .header {
            margin-bottom: 1.5rem;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0.6rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.25);
        }

        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border: none;
            border-radius: 0.6rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.6);
        }

        /* Alert message styling */
        .alert {
            padding: 1rem;
            border-radius: 0.6rem;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--success);
            color: #6ee7b7;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--error);
            color: #fca5a5;
        }

        .alert ul {
            margin-left: 1.2rem;
            margin-top: 0.5rem;
        }

        /* Table styling */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            background: rgba(15, 23, 42, 0.8);
            color: var(--text-secondary);
            font-weight: 600;
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-student {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .badge-faculty {
            background: rgba(168, 85, 247, 0.2);
            color: #e9d5ff;
            border: 1px solid rgba(168, 85, 247, 0.4);
        }

        .badge-staff {
            background: rgba(245, 158, 11, 0.2);
            color: #fde68a;
            border: 1px solid rgba(245, 158, 11, 0.4);
        }

        .h2-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #818cf8;
            font-size: 0.8rem;
            text-decoration: none;
        }
        .h2-link:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 登録フォームカード -->
    <div class="glass-card">
        <div class="header">
            <h1>🍱 学食ユーザー登録</h1>
            <p>食堂電子マネーICカードの初期アカウントを発行します</p>
        </div>

        <div id="alertSuccess" class="alert alert-success"></div>
        <div id="alertError" class="alert alert-error"></div>

        <form id="userForm">
            <div class="form-group">
                <label for="studentOrStaffId">学籍番号 / 教職員番号</label>
                <input type="text" id="studentOrStaffId" placeholder="例: S2026001" required>
            </div>

            <div class="form-group">
                <label for="name">氏名</label>
                <input type="text" id="name" placeholder="例: 山田 太郎" required>
            </div>

            <div class="form-group">
                <label for="email">メールアドレス</label>
                <input type="email" id="email" placeholder="例: taro.yamada@univ.ac.jp" required>
            </div>

            <div class="form-group">
                <label for="role">区分</label>
                <select id="role" required>
                    <option value="STUDENT">学生</option>
                    <option value="FACULTY">教職員</option>
                    <option value="STAFF">食堂スタッフ</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">ユーザーアカウントを登録</button>
        </form>

        <a href="/h2-console" target="_blank" class="h2-link">⚙️ H2 Database Consoleを開く (JDBC URL: jdbc:h2:mem:cafeteriadb)</a>
    </div>

    <!-- 登録済みユーザー一覧カード -->
    <div class="glass-card">
        <div class="header">
            <h1>👥 登録済みユーザー一覧</h1>
            <p>データベースに格納されている現在の食堂利用ユーザー</p>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>学籍/教職員ID</th>
                    <th>氏名</th>
                    <th>区分</th>
                    <th>メールアドレス</th>
                </tr>
                </thead>
                <tbody id="userTableBody">
                <tr>
                    <td colspan="4" style="text-align:center; color: var(--text-secondary);">読み込み中...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = '/api/users';

    document.addEventListener('DOMContentLoaded', () => {
        loadUsers();

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlerts();

            const payload = {
                studentOrStaffId: document.getElementById('studentOrStaffId').value.trim(),
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                role: document.getElementById('role').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess(`✨ ユーザー「${data.name}」（${data.studentOrStaffId}）を登録しました！`);
                    document.getElementById('userForm').reset();
                    loadUsers();
                } else {
                    handleErrorResponse(data);
                }
            } catch (err) {
                showError('サーバー通信エラーが発生しました。ネットワーク状態を確認してください。');
            }
        });
    });

    async function loadUsers() {
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error();
            const users = await res.json();

            const tbody = document.getElementById('userTableBody');
            if (users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color: var(--text-secondary);">登録データがありません。左のフォームから登録してください。</td></tr>`;
                return;
            }

            tbody.innerHTML = users.map(u => {
                let badgeClass = 'badge-student';
                if (u.roleLabel === '教職員') badgeClass = 'badge-faculty';
                if (u.roleLabel === '食堂スタッフ') badgeClass = 'badge-staff';

                return `
                    <tr>
                        <td><strong>${escapeHtml(u.studentOrStaffId)}</strong></td>
                        <td>${escapeHtml(u.name)}</td>
                        <td><span class="badge ${badgeClass}">${escapeHtml(u.roleLabel)}</span></td>
                        <td>${escapeHtml(u.email)}</td>
                    </tr>
                `;
            }).join('');
        } catch (e) {
            document.getElementById('userTableBody').innerHTML = `<tr><td colspan="4" style="text-align:center; color: var(--error);">ユーザー一覧の取得に失敗しました</td></tr>`;
        }
    }

    function handleErrorResponse(data) {
        if (data.errors && data.errors.length > 0) {
            const listHtml = '<ul>' + data.errors.map(e => `<li><strong>${escapeHtml(e.field)}</strong>: ${escapeHtml(e.message)}</li>`).join('') + '</ul>';
            showError(`⚠️ ${escapeHtml(data.message)}` + listHtml);
        } else {
            showError(`⚠️ ${escapeHtml(data.message || '登録に失敗しました。')}`);
        }
    }

    function showSuccess(msg) {
        const el = document.getElementById('alertSuccess');
        el.innerHTML = msg;
        el.style.display = 'block';
    }

    function showError(msgHtml) {
        const el = document.getElementById('alertError');
        el.innerHTML = msgHtml;
        el.style.display = 'block';
    }

    function hideAlerts() {
        document.getElementById('alertSuccess').style.display = 'none';
        document.getElementById('alertError').style.display = 'none';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, function(m) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
        });
    }
</script>
</body>
</html>
